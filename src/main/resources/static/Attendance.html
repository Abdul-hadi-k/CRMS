<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CRMS — Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .navbar { background: #1a1a2e !important; }
        .navbar-brand { font-weight: 800; color: white !important; }
        .navbar-brand span { color: #198754; }
        .nav-link { color: rgba(255,255,255,0.7) !important; }
        .nav-link:hover, .nav-link.active { color: white !important; }
        .page-header { padding: 2rem 0 1rem; }
        .page-header h3 { font-weight: 800; color: #1a1a2e; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .table th { background: #1a1a2e; color: white; font-size: 0.8rem; text-transform: uppercase; }
        .table td { vertical-align: middle; }
        .btn-present { border: 2px solid #198754; color: #198754; background: transparent; border-radius: 6px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-present.selected { background: #198754; color: white; }
        .btn-absent  { border: 2px solid #dc3545; color: #dc3545; background: transparent; border-radius: 6px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-absent.selected  { background: #dc3545; color: white; }
        .btn-leave   { border: 2px solid #fd7e14; color: #fd7e14; background: transparent; border-radius: 6px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-leave.selected   { background: #fd7e14; color: white; }
        .status-Present { background: #d1e7dd; color: #0a3622; border-radius: 6px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; }
        .status-Absent  { background: #f8d7da; color: #842029; border-radius: 6px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; }
        .status-Leave   { background: #ffe5d0; color: #7c3a00; border-radius: 6px; padding: 3px 10px; font-size: 0.8rem; font-weight: 600; }
        .mark-section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-top: 4px solid #198754; }
        .btn-save-all { background: #198754; color: white; border: none; border-radius: 8px; padding: 0.5rem 1.4rem; font-weight: 600; }
        .btn-save-all:hover { background: #157347; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">CR<span>MS</span></a>
        <div class="d-flex gap-2">
            <a href="dashboard.html"  class="nav-link">Dashboard</a>
            <a href="student.html"   class="nav-link">Students</a>
            <a href="result.html"    class="nav-link">Results</a>
            <a href="attendance.html" class="nav-link active">Attendance</a>
            <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h3>Attendance</h3>
        <p class="text-muted mb-0">Mark and track student attendance</p>
    </div>

    <!-- Mark Attendance -->
    <div class="mark-section">
        <h6 class="fw-bold mb-3">📋 Mark Attendance</h6>
        <div class="d-flex align-items-end gap-3 mb-3 flex-wrap">
            <div>
                <label class="form-label fw-semibold small">Select Date</label>
                <input type="date" class="form-control" id="attDate"/>
            </div>
            <button class="btn btn-dark" onclick="loadSheet()">Load Students</button>
        </div>
        <div id="attSheet" style="display:none;">
            <div id="attRows"></div>
            <button class="btn-save-all mt-3" onclick="saveAll()">✓ Save Attendance</button>
        </div>
    </div>

    <!-- History -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="fw-bold mb-0">Attendance History</h6>
        <input type="text" class="form-control w-auto" placeholder="Search..." oninput="filterAtt(this.value)" style="max-width:220px;"/>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Student</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="attTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = '/api';
    const teacher = JSON.parse(localStorage.getItem('crms_teacher') || 'null');
    if (!teacher) window.location.href = 'login.html';

    let allStudents = [];
    let allAtt      = [];
    let attStates   = {};

    document.getElementById('attDate').value = new Date().toISOString().split('T')[0];

    window.onload = async () => {
        await loadStudents();
        await loadAtt();
    };

    async function loadStudents() {
        try {
            const res = await fetch(`${API}/students`);
            allStudents = await res.json();
        } catch {}
    }

    async function loadAtt() {
        try {
            const res = await fetch(`${API}/attendance`);
            allAtt = await res.json();
            renderTable(allAtt);
        } catch { renderTable([]); }
    }

    function renderTable(records) {
        const tb = document.getElementById('attTable');
        if (!records.length) {
            tb.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No attendance records yet.</td></tr>';
            return;
        }
        const sorted = [...records].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        tb.innerHTML = sorted.map((r, i) => {
            const sName = (allStudents.find(s => s.id === r.student_id) || {}).name || 'Unknown';
            return `
        <tr>
          <td class="text-muted">${i + 1}</td>
          <td><strong>${sName}</strong></td>
          <td class="text-muted small">${r.date || '—'}</td>
          <td><span class="status-${r.status}">${r.status}</span></td>
          <td><button class="btn btn-sm btn-outline-danger" onclick="deleteAtt(${r.id})">Delete</button></td>
        </tr>`;
        }).join('');
    }

    function filterAtt(q) {
        renderTable(allAtt.filter(r => {
            const sName = (allStudents.find(s => s.id === r.student_id) || {}).name || '';
            return sName.toLowerCase().includes(q.toLowerCase()) ||
                (r.date || '').includes(q) ||
                (r.status || '').toLowerCase().includes(q.toLowerCase());
        }));
    }

    function loadSheet() {
        const date = document.getElementById('attDate').value;
        if (!date) { alert('Please select a date.'); return; }
        if (!allStudents.length) { alert('No students found. Add students first.'); return; }

        allStudents.forEach(s => {
            const existing = allAtt.find(a => a.student_id === s.id && a.date === date);
            attStates[s.id] = existing?.status || 'Present';
        });

        document.getElementById('attRows').innerHTML = allStudents.map(s => `
      <div class="d-flex align-items-center justify-content-between py-2 border-bottom">
        <strong>${s.name}</strong>
        <div class="d-flex gap-2">
          <button class="btn-present ${attStates[s.id] === 'Present' ? 'selected' : ''}"
            onclick="setStatus(${s.id}, 'Present', this)">✓ Present</button>
          <button class="btn-absent ${attStates[s.id] === 'Absent' ? 'selected' : ''}"
            onclick="setStatus(${s.id}, 'Absent', this)">✗ Absent</button>
          <button class="btn-leave ${attStates[s.id] === 'Leave' ? 'selected' : ''}"
            onclick="setStatus(${s.id}, 'Leave', this)">~ Leave</button>
        </div>
      </div>
    `).join('');

        document.getElementById('attSheet').style.display = 'block';
    }

    function setStatus(studentId, status, btn) {
        attStates[studentId] = status;
        const row = btn.closest('.d-flex');
        row.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    async function saveAll() {
        const date = document.getElementById('attDate').value;
        for (const [sid, status] of Object.entries(attStates)) {
            const existing = allAtt.find(a => a.student_id == sid && a.date === date);
            const body = { student_id: parseInt(sid), date, status };
            try {
                if (existing) {
                    await fetch(`${API}/attendance/${existing.id}`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                    });
                } else {
                    await fetch(`${API}/attendance`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                    });
                }
            } catch {}
        }
        document.getElementById('attSheet').style.display = 'none';
        await loadAtt();
        alert('Attendance saved successfully!');
    }

    async function deleteAtt(id) {
        if (!confirm('Delete this record?')) return;
        try {
            await fetch(`${API}/attendance/${id}`, { method: 'DELETE' });
            loadAtt();
        } catch { alert('Error deleting.'); }
    }

    function logout() { localStorage.removeItem('crms_teacher'); window.location.href = 'login.html'; }
</script>
</body>
</html>
