<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CRMS — Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .navbar { background: #1a1a2e !important; }
        .navbar-brand { font-weight: 800; color: white !important; }
        .navbar-brand span { color: #0d6efd; }
        .nav-link { color: rgba(255,255,255,0.7) !important; }
        .nav-link:hover, .nav-link.active { color: white !important; }
        .page-header { padding: 2rem 0 1rem; }
        .page-header h3 { font-weight: 800; color: #1a1a2e; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .btn-add { background: #0d6efd; color: white; border: none; border-radius: 8px; padding: 0.5rem 1.2rem; font-weight: 600; }
        .btn-add:hover { background: #0b5ed7; color: white; }
        .table th { background: #1a1a2e; color: white; font-size: 0.8rem; text-transform: uppercase; }
        .table td { vertical-align: middle; }
        .grade-badge { border-radius: 6px; padding: 3px 10px; font-size: 0.8rem; font-weight: 700; }
        .grade-A  { background: #d1e7dd; color: #0a3622; }
        .grade-B  { background: #cfe2ff; color: #084298; }
        .grade-C  { background: #fff3cd; color: #664d03; }
        .grade-D  { background: #ffe5d0; color: #7c3a00; }
        .grade-F  { background: #f8d7da; color: #842029; }
        .pct-bar  { width: 70px; height: 6px; background: #e9ecef; border-radius: 3px; display: inline-block; margin-left: 6px; vertical-align: middle; }
        .pct-fill { height: 100%; border-radius: 3px; background: #0d6efd; }
        .grade-preview { background: #f8f9fa; border-radius: 8px; padding: 0.7rem 1rem; margin-top: 0.5rem; font-size: 0.9rem; color: #555; text-align: center; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">CR<span>MS</span></a>
        <div class="d-flex gap-2">
            <a href="dashboard.html"  class="nav-link">Dashboard</a>
            <a href="student.html"   class="nav-link">Students</a>
            <a href="result.html"    class="nav-link active">Results</a>
            <a href="attendance.html" class="nav-link">Attendance</a>
            <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3>Results</h3>
            <p class="text-muted mb-0">Enter and calculate student results</p>
        </div>
        <button class="btn-add" onclick="openModal()">+ Add Result</button>
    </div>

    <div class="card mb-3 p-3">
        <input type="text" class="form-control" placeholder="Search by student name or subject..." oninput="filterResults(this.value)"/>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Student</th>
                    <th>Subject</th>
                    <th>Marks</th>
                    <th>Percentage</th>
                    <th>Grade</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="resultTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Add Result</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="resultId"/>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Student</label>
                    <select class="form-select" id="rStudent"><option value="">Select student...</option></select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Subject</label>
                    <input type="text" class="form-control" id="rSubject" placeholder="Mathematics"/>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label fw-semibold">Marks Obtained</label>
                        <input type="number" class="form-control" id="rMarks" placeholder="85" oninput="previewGrade()"/>
                    </div>
                    <div class="col">
                        <label class="form-label fw-semibold">Total Marks</label>
                        <input type="number" class="form-control" id="rTotal" placeholder="100" oninput="previewGrade()"/>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Exam Date</label>
                    <input type="date" class="form-control" id="rDate"/>
                </div>
                <div class="grade-preview" id="gradePreview">Enter marks to preview grade</div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button class="btn" style="background:#0d6efd;color:white;font-weight:600;" onclick="saveResult()">Save Result</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = '/api';
    const teacher = JSON.parse(localStorage.getItem('crms_teacher') || 'null');
    if (!teacher) window.location.href = 'login.html';

    let allResults  = [];
    let allStudents = [];
    let modal;

    window.onload = async () => {
        modal = new bootstrap.Modal(document.getElementById('resultModal'));
        await loadStudents();
        await loadResults();
    };

    async function loadStudents() {
        try {
            const res = await fetch(`${API}/students`);
            allStudents = await res.json();
            const sel = document.getElementById('rStudent');
            sel.innerHTML = '<option value="">Select student...</option>' +
                allStudents.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        } catch {}
    }

    async function loadResults() {
        try {
            const res = await fetch(`${API}/results`);
            allResults = await res.json();
            renderTable(allResults);
        } catch { renderTable([]); }
    }

    function getGrade(pct) {
        if (pct >= 90) return 'A+';
        if (pct >= 80) return 'A';
        if (pct >= 70) return 'B';
        if (pct >= 60) return 'C';
        if (pct >= 50) return 'D';
        return 'F';
    }

    function gradeClass(g) {
        if (g.startsWith('A')) return 'grade-A';
        if (g.startsWith('B')) return 'grade-B';
        if (g.startsWith('C')) return 'grade-C';
        if (g.startsWith('D')) return 'grade-D';
        return 'grade-F';
    }

    function renderTable(results) {
        const tb = document.getElementById('resultTable');
        if (!results.length) {
            tb.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No results found. Add one!</td></tr>';
            return;
        }
        tb.innerHTML = results.map((r, i) => {
            const pct   = Math.round((r.marks / r.total_marks) * 100);
            const grade = getGrade(pct);
            const sName = (allStudents.find(s => s.id === r.student_id) || {}).name || 'Unknown';
            return `
        <tr>
          <td class="text-muted">${i + 1}</td>
          <td><strong>${sName}</strong></td>
          <td>${r.subject}</td>
          <td><strong>${r.marks}</strong><span class="text-muted"> / ${r.total_marks}</span></td>
          <td>
            ${pct}%
            <span class="pct-bar"><span class="pct-fill" style="width:${pct}%"></span></span>
          </td>
          <td><span class="grade-badge ${gradeClass(grade)}">${grade}</span></td>
          <td class="text-muted small">${r.exam_date || '—'}</td>
          <td>
            <button class="btn btn-sm btn-outline-dark me-1" onclick="editResult(${r.id})">Edit</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteResult(${r.id})">Delete</button>
          </td>
        </tr>`;
        }).join('');
    }

    function filterResults(q) {
        renderTable(allResults.filter(r => {
            const sName = (allStudents.find(s => s.id === r.student_id) || {}).name || '';
            return sName.toLowerCase().includes(q.toLowerCase()) ||
                r.subject.toLowerCase().includes(q.toLowerCase());
        }));
    }

    function previewGrade() {
        const m = parseFloat(document.getElementById('rMarks').value);
        const t = parseFloat(document.getElementById('rTotal').value);
        const el = document.getElementById('gradePreview');
        if (m && t && t > 0) {
            const pct = Math.round((m / t) * 100);
            el.innerHTML = `Percentage: <strong>${pct}%</strong> &nbsp;|&nbsp; Grade: <strong>${getGrade(pct)}</strong>`;
        } else {
            el.textContent = 'Enter marks to preview grade';
        }
    }

    function openModal(result = null) {
        document.getElementById('resultId').value    = result?.id          || '';
        document.getElementById('rStudent').value    = result?.student_id  || '';
        document.getElementById('rSubject').value    = result?.subject     || '';
        document.getElementById('rMarks').value      = result?.marks       || '';
        document.getElementById('rTotal').value      = result?.total_marks || 100;
        document.getElementById('rDate').value       = result?.exam_date   || '';
        document.getElementById('modalTitle').textContent = result ? 'Edit Result' : 'Add Result';
        document.getElementById('gradePreview').textContent = 'Enter marks to preview grade';
        modal.show();
    }

    function editResult(id) { openModal(allResults.find(r => r.id === id)); }

    async function saveResult() {
        const id   = document.getElementById('resultId').value;
        const body = {
            student_id:  parseInt(document.getElementById('rStudent').value),
            subject:     document.getElementById('rSubject').value.trim(),
            marks:       parseInt(document.getElementById('rMarks').value),
            total_marks: parseInt(document.getElementById('rTotal').value) || 100,
            exam_date:   document.getElementById('rDate').value || null
        };
        if (!body.student_id || !body.subject || isNaN(body.marks)) {
            alert('Please fill all fields.');
            return;
        }
        try {
            await fetch(id ? `${API}/results/${id}` : `${API}/results`, {
                method:  id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(body)
            });
            modal.hide();
            loadResults();
        } catch { alert('Error saving result.'); }
    }

    async function deleteResult(id) {
        if (!confirm('Delete this result?')) return;
        try {
            await fetch(`${API}/results/${id}`, { method: 'DELETE' });
            loadResults();
        } catch { alert('Error deleting.'); }
    }

    function logout() { localStorage.removeItem('crms_teacher'); window.location.href = 'login.html'; }
</script>
</body>
</html>
