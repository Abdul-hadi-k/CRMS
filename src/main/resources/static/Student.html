<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CRMS — Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .navbar { background: #1a1a2e !important; }
        .navbar-brand { font-weight: 800; color: white !important; }
        .navbar-brand span { color: #e94560; }
        .nav-link { color: rgba(255,255,255,0.7) !important; }
        .nav-link:hover, .nav-link.active { color: white !important; }
        .page-header { padding: 2rem 0 1rem; }
        .page-header h3 { font-weight: 800; color: #1a1a2e; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .btn-add { background: #e94560; color: white; border: none; border-radius: 8px; padding: 0.5rem 1.2rem; font-weight: 600; }
        .btn-add:hover { background: #c73652; color: white; }
        .table th { background: #1a1a2e; color: white; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .table td { vertical-align: middle; }
        .badge-class { background: #fff0f3; color: #e94560; border: 1px solid #f5c2c7; border-radius: 6px; padding: 3px 10px; font-size: 0.78rem; font-weight: 600; }
        .badge-roll { background: #f8f9fa; color: #555; border: 1px solid #dee2e6; border-radius: 6px; padding: 3px 10px; font-size: 0.78rem; font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">CR<span>MS</span></a>
        <div class="d-flex gap-2">
            <a href="dashboard.html"  class="nav-link">Dashboard</a>
            <a href="student.html"   class="nav-link active">Students</a>
            <a href="result.html"    class="nav-link">Results</a>
            <a href="attendance.html" class="nav-link">Attendance</a>
            <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3>Students</h3>
            <p class="text-muted mb-0">Manage all enrolled students</p>
        </div>
        <button class="btn-add" onclick="openModal()">+ Add Student</button>
    </div>

    <div class="card mb-3 p-3">
        <input type="text" class="form-control" placeholder="Search by name or roll number..." oninput="filterStudents(this.value)"/>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Class</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="studentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Add Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="studentId"/>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control" id="sName" placeholder="Ahmed Khan"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Roll Number</label>
                    <input type="text" class="form-control" id="sRoll" placeholder="2024-CS-01"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Class</label>
                    <input type="text" class="form-control" id="sClass" placeholder="10-A"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control" id="sEmail" placeholder="student@email.com"/>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button class="btn" style="background:#1a1a2e;color:white;font-weight:600;" onclick="saveStudent()">Save Student</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = '/api';
    const teacher = JSON.parse(localStorage.getItem('crms_teacher') || 'null');
    if (!teacher) window.location.href = 'login.html';

    let allStudents = [];
    let modal;

    window.onload = () => {
        modal = new bootstrap.Modal(document.getElementById('studentModal'));
        loadStudents();
    };

    async function loadStudents() {
        try {
            const res = await fetch(`${API}/students`);
            allStudents = await res.json();
            renderTable(allStudents);
        } catch { renderTable([]); }
    }

    function renderTable(students) {
        const tb = document.getElementById('studentTable');
        if (!students.length) {
            tb.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No students found. Add one!</td></tr>';
            return;
        }
        tb.innerHTML = students.map((s, i) => `
      <tr>
        <td class="text-muted">${i + 1}</td>
        <td><strong>${s.name}</strong></td>
        <td><span class="badge-roll">${s.roll_no}</span></td>
        <td><span class="badge-class">${s.className}</span></td>
        <td class="text-muted">${s.email}</td>
        <td>
          <button class="btn btn-sm btn-outline-dark me-1" onclick="editStudent(${s.id})">Edit</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteStudent(${s.id})">Delete</button>
        </td>
      </tr>
    `).join('');
    }

    function filterStudents(q) {
        renderTable(allStudents.filter(s =>
            s.name.toLowerCase().includes(q.toLowerCase()) ||
            s.roll_no.toLowerCase().includes(q.toLowerCase())
        ));
    }

    function openModal(student = null) {
        document.getElementById('studentId').value = student?.id || '';
        document.getElementById('sName').value     = student?.name      || '';
        document.getElementById('sRoll').value     = student?.roll_no   || '';
        document.getElementById('sClass').value    = student?.className || '';
        document.getElementById('sEmail').value    = student?.email     || '';
        document.getElementById('modalTitle').textContent = student ? 'Edit Student' : 'Add Student';
        modal.show();
    }

    function editStudent(id) {
        openModal(allStudents.find(s => s.id === id));
    }

    async function saveStudent() {
        const id   = document.getElementById('studentId').value;
        const body = {
            name:      document.getElementById('sName').value.trim(),
            roll_no:   document.getElementById('sRoll').value.trim(),
            className: document.getElementById('sClass').value.trim(),
            email:     document.getElementById('sEmail').value.trim()
        };
        if (!body.name || !body.roll_no || !body.className) {
            alert('Please fill Name, Roll No and Class.');
            return;
        }
        try {
            await fetch(id ? `${API}/students/${id}` : `${API}/students`, {
                method:  id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(body)
            });
            modal.hide();
            loadStudents();
        } catch { alert('Error saving student.'); }
    }

    async function deleteStudent(id) {
        if (!confirm('Delete this student?')) return;
        try {
            await fetch(`${API}/students/${id}`, { method: 'DELETE' });
            loadStudents();
        } catch { alert('Error deleting.'); }
    }

    function logout() { localStorage.removeItem('crms_teacher'); window.location.href = 'login.html'; }
</script>
</body>
</html>
