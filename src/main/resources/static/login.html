<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CRMS — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
        .brand { font-size: 1.8rem; font-weight: 800; color: #1a1a2e; margin-bottom: 0.3rem; }
        .brand span { color: #e94560; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        .btn-login { background: #1a1a2e; color: white; width: 100%; padding: 0.75rem; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; }
        .btn-login:hover { background: #e94560; color: white; }
        .form-control:focus { border-color: #e94560; box-shadow: 0 0 0 3px rgba(233,69,96,0.15); }
        .error-msg { background: #fff0f3; border: 1px solid #f5c2c7; color: #842029; border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.85rem; display: none; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">CR<span>MS</span></div>
    <div class="subtitle">Classroom Management System</div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" id="email" class="form-control" placeholder="admin@crms.com"/>
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••"/>
    </div>

    <div class="error-msg" id="errorMsg">Invalid email or password.</div>

    <button class="btn-login mt-2" onclick="handleLogin()">Sign In</button>

    <div class="text-center mt-3" style="font-size:0.8rem;color:#aaa;">
        Demo: ahadi@gmail.com / admin123
    </div>
</div>

<script>
    async function handleLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.style.display = 'none';

        if (!email || !password) {
            errorMsg.textContent = 'Please fill in all fields.';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('crms_teacher', JSON.stringify(data));
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.textContent = 'Invalid email or password.';
                errorMsg.style.display = 'block';
            }
        } catch (e) {
            errorMsg.textContent = 'Cannot connect to server. Make sure backend is running.';
            errorMsg.style.display = 'block';
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
